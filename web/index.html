<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildrose - Eve</title>
    <link rel="stylesheet" href="/web/css/main.css">
</head>
<body>
    <div id="app">
        <!-- Header Panel (Top Bento) -->
        <header id="top-panel">
            <button id="toggle-music">🔊 Play Music</button>
        </header>

        <!-- Main Game Area (Center Bento) -->
        <main id="game-area">
            <div id="cat-sprite" class="cat-idle"></div>
        </main>

        <!-- Chat Panel (Bottom Bento) -->
        <footer id="bottom-panel">
            <div id="chat-history">
                <!-- Messages will be injected here -->
            </div>
            <div id="typing-indicator" class="hidden">Eve is typing...</div>
            <div id="chat-input-container">
                <textarea id="chat-input" placeholder="Talk to Eve... (Press Enter to send)" rows="1"></textarea>
            </div>
        </footer>
    </div>

    <!-- Audio assets -->
    <audio id="bg-music" loop src="/static/faraon-harold-budd.wav"></audio>
    <audio id="sfx-purr" src="/static/purring-1.ogg" preload="auto"></audio>
    <audio id="sfx-meow" src="/static/meow.wav" preload="auto"></audio>

    <script src="/web/js/main.js"></script>
</body>
</html>
